<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<script>/* tema: aplica preferência salva, senão a do sistema — antes do CSS, sem flash */
(function(){try{var s=localStorage.getItem('scm-theme');var t=s||((window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%232563eb'/><text x='16' y='22' font-size='17' font-weight='700' text-anchor='middle' fill='white' font-family='Segoe UI,Arial'>S</text></svg>">
<title>SCM Analytics — Chaveamento da Copa 2026</title>
<style>
  :root{--bg:#fff;--panel:#f7f8fa;--text:#1c1f23;--muted:#6b7280;--border:#e5e7eb;--border-strong:#d2d6db;
    --accent:#2563eb;--accent-weak:#eef3ff;--accent-strong:#1d57d6;--radius:8px}
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .tnum{font-variant-numeric:tabular-nums}
  .app{display:flex;min-height:100vh}
  .sidebar{width:210px;flex:none;background:var(--panel);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .sb-brand{font-weight:600;font-size:15px;padding:4px 8px 16px;letter-spacing:-.01em}
  .sb-brand span{display:block;color:var(--muted);font-weight:400;font-size:12px;margin-top:2px}
  .sb-nav{display:flex;flex-direction:column;gap:2px}
  .sb-nav a{display:block;padding:9px 11px;border-radius:6px;color:var(--text);text-decoration:none;font-size:14px}
  .sb-nav a:hover{background:var(--hover)}
  .sb-nav a.active{background:var(--accent-weak);color:var(--accent);font-weight:500}
  .sb-foot{margin-top:auto;color:var(--muted);font-size:11px;padding-top:12px;border-top:1px solid var(--border)}
  .content{flex:1;min-width:0}
  main{max-width:1180px;margin:0 auto;padding:24px 24px 44px}
  h1{font-size:18px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em}
  .sub{color:var(--muted);margin:0 0 18px;font-size:13px}
  .toolbar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  .tabs{display:inline-flex;border:1px solid var(--border-strong);border-radius:8px;overflow:hidden}
  .tabs button{height:34px;padding:0 16px;border:0;background:#fff;color:var(--text);font:inherit;cursor:pointer}
  .tabs button.on{background:var(--accent);color:#fff;font-weight:500}
  .ctl{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted)}
  .ctl input{height:34px;width:80px;padding:0 10px;border:1px solid var(--border-strong);border-radius:6px;font:inherit}
  .ctl button{height:34px;padding:0 14px;border:1px solid var(--border-strong);border-radius:6px;background:#fff;color:var(--text);font:inherit;cursor:pointer}
  .ctl button:hover{background:var(--panel)}
  .champ{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--accent-weak);color:var(--accent-strong);
    border:1px solid #d7e2fb;border-radius:999px;padding:6px 16px;font-weight:600}
  .scroll{overflow-x:auto;padding-bottom:8px}
  .bracket{display:flex;gap:10px;min-width:1080px}
  .col{display:flex;flex-direction:column;justify-content:space-around;flex:1;min-width:118px}
  .col h3{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:center;margin:0 0 8px;font-weight:600}
  .m{border:1px solid var(--border);border-radius:7px;overflow:hidden;margin:5px 0;background:#fff;box-shadow:0 1px 2px rgba(16,24,40,.03)}
  .m.final{border:2px solid var(--accent)}
  .row{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:13px;color:var(--muted)}
  .row+.row{border-top:1px solid var(--border)}
  .row .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .p{flex:none}
  .row.w{background:var(--accent-weak);color:var(--accent-strong);font-weight:600}
  .pview{max-width:760px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:8px 10px;border-bottom:1px solid var(--border)}
  th:first-child,td:first-child{text-align:left}
  td:first-child{font-weight:500}
  th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;font-weight:500}
  .barcell{position:relative} .barcell i{position:absolute;left:0;top:0;bottom:0;background:var(--accent-weak);z-index:0;border-radius:3px}
  .barcell span{position:relative;z-index:1}
  .note{color:var(--muted);font-size:12px;margin-top:18px;max-width:900px;line-height:1.6}
  .err{color:#9b2c2c;padding:12px 0}
  .pbar{height:8px;background:var(--panel);border:1px solid var(--border);border-radius:999px;overflow:hidden;margin-top:8px}
  .pbar i{display:block;height:100%;width:0;background:var(--accent);transition:width .3s linear}
  .hide{display:none}
  @media(max-width:720px){.app{flex-direction:column}.sidebar{width:auto;height:auto;position:static;flex-direction:row;align-items:center;gap:8px;overflow-x:auto;padding:8px 12px}.sb-brand{padding:0 8px 0 4px;white-space:nowrap}.sb-brand span{display:none}.sb-nav{flex-direction:row}.sb-foot{display:none}}

  /* P7: dark mode ADITIVO (só no modo escuro do SO; não afeta o claro). Sobrescreve as vars
     e as superfícies que eram brancas fixas. */
  /* Tema escuro — dirigido por [data-theme] (botão claro/escuro na barra lateral).
     --hover e --input-bg corrigem o hover e os campos de texto que sumiam no escuro. */
  :root{--hover:#eceff3;--input-bg:#ffffff}
  :root[data-theme="dark"]{--bg:#0f1115;--panel:#171a21;--text:#e6e8eb;--muted:#98a2b3;--border:#272c36;
    --border-strong:#39404c;--accent:#4f8cff;--accent-weak:#18233b;--accent-strong:#6ba0ff;
    --win:#4f8cff;--draw:#8a93a3;--loss:#aeb6c2;--hover:#222a37;--input-bg:#11151c}
  [data-theme="dark"] body{background:var(--bg);color:var(--text)}
  [data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--input-bg);color:var(--text);border-color:var(--border-strong)}
  [data-theme="dark"] .result,[data-theme="dark"] .stat,[data-theme="dark"] .card,[data-theme="dark"] .m,[data-theme="dark"] .mktcmp,[data-theme="dark"] .tabs button,[data-theme="dark"] .btn,[data-theme="dark"] .ctl button,[data-theme="dark"] .chip{background:var(--panel)}
  [data-theme="dark"] .sidebar{background:var(--panel)}
  [data-theme="dark"] .error,[data-theme="dark"] .warn{background:#2a1416;border-color:#5a2a2a;color:#f3b6b6}
</style>
</head>
<body>
<div class="app">
  {% set active='bracket' %}
{% include '_sidebar.html' %}
  <div class="content">
    <main>
      <h1>Chaveamento mais provável</h1>
      <p class="sub">Dos 16 avos à final. A % é a chance de avançar daquele confronto. Altitude entra só nos jogos de grupo; mata-mata é neutro.</p>
      <div class="toolbar">
        <div class="tabs" role="tablist" aria-label="Visualização">
          <button id="tabBk" class="on" role="tab" aria-selected="true" onclick="show('bk')">Chaveamento</button>
          <button id="tabMc" role="tab" aria-selected="false" onclick="show('mc')">Probabilidades</button>
        </div>
        <div class="ctl"><span>Simulações</span><input id="sims" type="number" value="2000" min="200" max="50000" step="500" inputmode="numeric" class="tnum"><button id="go">Recarregar</button></div>
        <span class="champ" id="champ" style="display:none"></span>
      </div>

      <div id="viewBk">
        <div class="scroll"><div class="bracket" id="bracket"><div class="sub">Carregando…</div></div></div>
      </div>
      <div id="viewMc" class="hide pview">
        <table><thead><tr><th>Seleção</th><th>Título</th><th>Final</th><th>Semi</th><th>Passa 1ª fase</th></tr></thead>
        <tbody id="mc"></tbody></table>
      </div>

      <div class="note" id="note"></div>
    </main>
  </div>
</div>
<script>
  const $=id=>document.getElementById(id);
  let DATA=null;
  const COLS=[["16 avos",[74,77,73,75,83,84,81,82]],["Oitavas",[89,90,93,94]],["Quartas",[97,98]],["Semi",[101]],
    ["Final",[104]],["Semi",[102]],["Quartas",[99,100]],["Oitavas",[91,92,95,96]],["16 avos",[76,78,79,80,86,88,85,87]]];
  function show(v){
    $('viewBk').classList.toggle('hide', v!=='bk');
    $('viewMc').classList.toggle('hide', v!=='mc');
    $('tabBk').classList.toggle('on', v==='bk');
    $('tabMc').classList.toggle('on', v==='mc');
    $('tabBk').setAttribute('aria-selected', v==='bk'); $('tabMc').setAttribute('aria-selected', v==='mc');
  }
  function row(t,win,p){return `<div class="row ${win?'w':''}"><span class="nm" title="${t||''}">${t||'—'}</span><span class="p tnum">${win?Math.round(p*100)+'%':''}</span></div>`;}
  function card(mid,d){const x=d.match[String(mid)];if(!x)return'';const f=mid===104?' final':'';
    return `<div class="m${f}">${row(x.a,x.winner===x.a,x.p_adv)}${row(x.b,x.winner===x.b,x.p_adv)}</div>`;}
  let POLL=null;
  function renderAll(d){
    DATA=d;
    $('model').textContent='modelo '+d.model;
    $('champ').style.display=''; $('champ').textContent='Campeão: '+d.champion;
    $('bracket').innerHTML=COLS.map(c=>`<div class="col"><h3>${c[0]}</h3>${c[1].map(m=>card(m,d)).join('')}</div>`).join('');
    const max=Math.max.apply(null,d.table.map(r=>r.p_champion))||1;
    $('mc').innerHTML=d.table.map(r=>
      `<tr><td>${r.team}</td><td class="tnum barcell"><i style="width:${(r.p_champion/max*100).toFixed(0)}%"></i><span>${(r.p_champion*100).toFixed(1)}%</span></td>`+
      `<td class="tnum">${(r.p_final*100).toFixed(0)}%</td><td class="tnum">${(r.p_semi*100).toFixed(0)}%</td><td class="tnum">${(r.p_advance*100).toFixed(0)}%</td></tr>`).join('');
    const vice=d.finalists.find(t=>t!==d.champion);
    $('note').innerHTML=`É <b>um</b> chaveamento (a "história"): a chance do bracket exato é ínfima. Os números rigorosos por seleção estão na aba <b>Probabilidades</b> (Monte Carlo, ${d.n_sims.toLocaleString()} torneios). Vice previsto: ${vice} · 3º: ${d.third}.`;
  }
  async function load(){
    if(POLL){clearInterval(POLL);POLL=null;}
    $('go').disabled=true; $('go').textContent='…';
    const sims=encodeURIComponent($('sims').value||2000);
    $('bracket').innerHTML='<div style="padding:18px;max-width:380px"><div class="sub" id="pmsg">Simulando o torneio…</div><div class="pbar"><i id="pbar"></i></div><div class="sub" style="margin-top:6px;font-size:11px">A 1ª vez calcula; depois fica em cache (instantâneo).</div></div>';
    async function tick(){
      let d;
      try{ d=await (await fetch('/api/bracket?sims='+sims)).json(); }
      catch(e){ if(POLL){clearInterval(POLL);POLL=null;} $('bracket').innerHTML='<div class="err">Falha ao carregar a API.</div>'; reset(); return; }
      if(d.erro){ if(POLL){clearInterval(POLL);POLL=null;} $('bracket').innerHTML='<div class="err">'+d.erro+'</div>'; reset(); return; }
      if(d.running){ const pb=$('pbar'); if(pb) pb.style.width=Math.max(3,d.pct||0)+'%'; const pm=$('pmsg'); if(pm) pm.textContent='Simulando o torneio… '+(d.pct||0)+'%'; return; }
      if(d.done){ if(POLL){clearInterval(POLL);POLL=null;} renderAll(d.result); reset(); }
    }
    tick(); POLL=setInterval(tick,700);
  }
  function reset(){ $('go').disabled=false; $('go').textContent='Recarregar'; }
  $('go').addEventListener('click',load);
  load();
</script>
</body>
</html>
